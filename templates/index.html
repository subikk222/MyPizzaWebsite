{% extends 'base.html' %}

{% block title %} Index {% endblock %}

{% block content %}
<div class="container" style="margin-top: 30px;">
    <div class="row">
        {% for product in products %}
        <div class="col-md-4" style="margin-bottom: 20px;">
            <div class="panel panel-default">
                <div class="panel-heading text-center"><strong>{{ product.name }}</strong></div>
                <div class="panel-body text-center">
                    {% if product.image_url %}
                    <img src="{{ product.image_url }}" class="img-responsive center-block" style="width:200px; height:200px; object-fit: cover;">
                    {% endif %}
                    <p>{{ product.description }}</p>
                    <p><strong>{{ product.price }} $</strong></p>

                    <button type="button" class="btn btn-success" onclick="showCounter(this)">Замовити</button>
                    <form action="{{ url_for('cart.add_cart', pizza_id=product.id) }}" method="POST" style="display: none; justify-content: center; gap: 10px; margin-top: 10px;">
                        <div style="display:flex; align-items:center; gap:5px;">
                            <button type="button" class="btn btn-danger btn-sm" onclick="changeQty(this, -1)">-</button>
                            <input type="number" name="quantity" value="1" min="1" style="width: 40px; text-align: center; border: 1px solid #ccc; border-radius: 4px;" readonly>
                            <button type="button" class="btn btn-danger btn-sm" onclick="changeQty(this, 1)">+</button>
                        </div>
                        <button type="submit" class="btn btn-success btn-sm">Додати</button>
                    </form>
                </div>
            </div>
        </div>
        {% else %}
        <p class="text-center">Наразі немає доступних піц.</p>
        {% endfor %}
    </div>
</div>

<script>
    function showCounter(button) {
        button.style.display = 'none';
        button.nextElementSibling.style.display = 'flex';
    }

    function changeQty(btn, delta) {
        let input = btn.parentElement.querySelector('input[type="number"]');
        let newVal = parseInt(input.value) + delta;
        if (newVal >= 1) {
            input.value = newVal;
        }
    }
</script>

{% endblock %}

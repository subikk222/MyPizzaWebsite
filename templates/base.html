<!DOCTYPE html>
<html lang="en">
<head>
    <title>Pizzeria</title>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <link rel="stylesheet" type="text/css" href="/static/style.css">
    <link rel="stylesheet" href="https://maxcdn.bootstrapcdn.com/bootstrap/3.4.1/css/bootstrap.min.css">
    <script src="https://ajax.googleapis.com/ajax/libs/jquery/3.7.1/jquery.min.js"></script>
    <script src="https://maxcdn.bootstrapcdn.com/bootstrap/3.4.1/js/bootstrap.min.js"></script>
    <style>
        .navbar-inverse .navbar-nav > li > a.menu-btn:hover {
            background-color: #000000;
            color: #ffffff;
        }
    </style>
</head>
<body>

<nav class="navbar navbar-inverse">
    <div class="container-fluid">
        <div class="navbar-header">
            <a class="navbar-brand" href="{{ url_for('shop.index') }}">Pizzeria</a>
        </div>
        <ul class="nav navbar-nav">
            <li><a href="{{ url_for('cart.cart') }}" class="menu-btn">cart</a></li>
            <li><a href="{{ url_for('reviews.score') }}" class="menu-btn">Review</a></li>
        </ul>
        <ul class="nav navbar-nav navbar-right">
            <li><a href="{{ url_for('auth.login') }}"><span class="glyphicon glyphicon-log-in"></span> Login</a></li>
        </ul>
    </div>
</nav>

<div class="main-content">
    {% block content %}
    {% endblock %}
</div>

<footer>
    <p>© <span id="year"></span> TechStore. Всі права захищені.</p>
</footer>

<script>
    document.getElementById("year").textContent = new Date().getFullYear();
</script>

</body>
</html>

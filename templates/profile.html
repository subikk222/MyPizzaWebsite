{% extends 'base.html' %}

{% block title %} Profile {% endblock %}

{% block content %}
<link rel="stylesheet" type="text/css" href="/static/review.css">

<div class="container">
    <h2>Profile</h2>
    <p>Hello, {{ user.name }}</p>
    <p><strong>Email:</strong> {{ user.email }}</p>
    <p><strong>Phone:</strong> {{ user.phone }}</p>

    <p>
        <a href="{{ url_for('auth.logout') }}">
            <button type="button">Exit</button>
        </a>
        <button type="button" onclick="toggleMenu()">Settings</button>
    </p>

    <div id="menu" style="display: none; margin-bottom: 15px;">
        <button type="button" onclick="showForm('nameForm')">Change Name</button>
        <button type="button" onclick="showForm('numberForm')">Change Phone</button>
        <button type="button" onclick="showForm('emailForm')">Change Email</button>
        <button type="button" onclick="showForm('passwordForm')">Change Password</button>
    </div>

    <div id="nameForm" style="display: none;">
        <form action="{{ url_for('auth.reset_name') }}" method="POST">
            <input type="text" name="new_name" placeholder="New name" value="{{ user.name }}" required>
            <button type="submit">Save</button>
        </form>
    </div>

    <div id="numberForm" style="display: none;">
        <form action="{{ url_for('auth.reset_number') }}" method="POST">
            <input type="text" name="new_number" placeholder="New phone" value="{{ user.phone }}" required>
            <button type="submit">Save</button>
        </form>
    </div>

    <div id="emailForm" style="display: none;">
        <form action="{{ url_for('auth.reset_email') }}" method="POST">
            <input type="email" name="new_email" placeholder="New email" value="{{ user.email }}" required>
            <button type="submit">Save</button>
        </form>
    </div>

    <div id="passwordForm" style="display: none;">
        <form action="{{ url_for('auth.reset_password') }}" method="POST">
            <input type="password" name="new_password" placeholder="New password (min 6)" minlength="6" required>
            <button type="submit">Save</button>
        </form>
    </div>
</div>

<script>
    function toggleMenu() {
        const menu = document.getElementById("menu");
        menu.style.display = menu.style.display === "none" ? "block" : "none";
    }

    function showForm(formId) {
        ["nameForm", "numberForm", "emailForm", "passwordForm"].forEach(function (id) {
            document.getElementById(id).style.display = "none";
        });
        document.getElementById(formId).style.display = "block";
    }
</script>
{% endblock %}

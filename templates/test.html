<!DOCTYPE html>
<html lang="uk">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Мій сайт</title>

    <style>
        body {
            margin: 0;
            font-family: Arial, sans-serif;
            background-color: #f4f4f4;
        }

        header {
            background-color: #333;
            color: white;
            padding: 20px;
            text-align: center;
        }

        nav {
            background-color: #444;
            padding: 10px;
            text-align: center;
        }

        nav a {
            color: white;
            text-decoration: none;
            margin: 0 15px;
        }

        main {
            padding: 30px;
            min-height: 400px;
            background-color: white;
        }

        .card {
            background-color: #eee;
            padding: 20px;
            border-radius: 10px;
            margin-top: 20px;
        }

        footer {
            background-color: #333;
            color: white;
            text-align: center;
            padding: 15px;
        }

</head>

<body>

    <header>
        <h1>Ласкаво просимо на мій сайт</h1>
        <p>Приклад простої HTML-структури</p>
    </header>

    <nav>
        <a href="#">Головна</a>
        <a href="#">Про нас</a>
        <a href="#">Послуги</a>
        <a href="#">Контакти</a>
    </nav>

    <main>
        <h2>Основний контент</h2>
        <p>
            Тут знаходиться основна інформація сторінки.
        </p>

        <div class="card">
            <h3>Новина або картка</h3>
            <p>
                Це приклад блоку контенту всередині сторінки.
            </p>
        </div>
    </main>

    <footer>
        <p>© 2026 Мій сайт. Всі права захищені.</p>
    </footer>

</body>
</html>
